{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Создание аккаунта</title>
    <link rel="stylesheet" href="{% static 'css/archive.css' %}">
</head>
<body>
    <div class="header">
        <a href="{% url 'archive' %}"><img src="{% static 'img/dpb-logo.png' %}" /></a>
    </div>
    <div class="create-page">
        <a href="{% url 'archive' %}" class="back-link">&larr; Вернуться на главную</a>
        <div class="create-card">
            <h2 class="create-title">Создание аккаунта</h2>
            <form method="POST" class="create-form">{% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Логин</label>
                    <input type="text" id="id_username" name="username" placeholder="Придумайте логин" value="{{ form.username }}">
                </div>
                <div class="form-group">
                    <label for="id_email">Email</label>
                    <input type="email" id="id_email" name="email" placeholder="Ваш email" value="{{ form.email }}">
                </div>
                <div class="form-group">
                    <label for="id_password">Пароль</label>
                    <input type="password" id="id_password" name="password" placeholder="Придумайте пароль">
                </div>
                <div class="form-actions">
                    <input type="submit" value="Зарегистрироваться" class="btn-submit">
                </div>
            </form>
            {% if form.errors %}
            <div class="field-errors">{{ form.errors }}</div>
            {% endif %}
            <p class="login-hint">Есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
        </div>
    </div>
</body>
</html>

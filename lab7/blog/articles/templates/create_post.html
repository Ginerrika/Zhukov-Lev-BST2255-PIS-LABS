{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Создание статьи</title>
    <link rel="stylesheet" href="{% static 'css/archive.css' %}">
</head>
<body>
    <div class="header">
        <a href="{% url 'archive' %}"><img src="{% static 'img/dpb-logo.png' %}" /></a>
    </div>
    <div class="create-page">
        <a href="{% url 'archive' %}" class="back-link">&larr; Вернуться на главную</a>
        <div class="create-card">
            <h2 class="create-title">Новая статья</h2>
            <form method="POST" class="create-form">{% csrf_token %}
                <div class="form-group">
                    <label for="id_title">Заголовок</label>
                    <input type="text" id="id_title" name="title" placeholder="Название статьи" value="{{ form.title }}">
                </div>
                <div class="form-group">
                    <label for="id_text">Содержание</label>
                    <textarea id="id_text" name="text" placeholder="Текст вашей статьи...">{{ form.text }}</textarea>
                </div>
                <div class="form-actions">
                    <input type="submit" value="Создать статью" class="btn-submit">
                </div>
            </form>
            {% if form.errors %}
            <div class="field-errors">{{ form.errors }}</div>
            {% endif %}
        </div>
    </div>
</body>
</html>

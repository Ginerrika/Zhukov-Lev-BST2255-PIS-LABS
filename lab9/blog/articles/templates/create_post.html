{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Создание статьи</title>
    <link rel="stylesheet" href="{% static 'css/archive.css' %}" />
  </head>
  <body>
    <div class="header">
      <div class="header-navbar">
        <a href="{% url 'archive' %}"
          ><img class="logo" src="{% static 'img/dpb-logo.png' %}"
        /></a>
        <p class="service-title">Блог-платформа</p>
        <div class="nav-actions">
          {% if user.is_authenticated %}
          <a href="{% url 'register' %}" class="register-link"
            >{{ user.username }}</a
          >
          <a href="{% url 'create_post' %}" class="register-link"
            >Добавить статью</a
          >
          <a href="{% url 'logout' %}" class="register-link">Выйти</a>
          {% else %}
          <a href="{% url 'register' %}" class="register-link"
            >Регистрация</a
          >
          <a href="{% url 'login' %}" class="register-link">Войти</a>
          <a href="{% url 'create_post' %}" class="register-link"
            >Добавить статью</a
          >
          {% endif %}
        </div>
      </div>
      <div class="parallax-banner">
        <div class="icons-for-parallax">
          <img
            class="icon-for-parallax-first"
            src="{% static 'img/article-icon-for-parallax.png' %}"
          />
          <img
            class="icon-for-parallax-second"
            src="{% static 'img/article-icon-for-parallax.png' %}"
          />
          <img
            class="icon-for-parallax-third"
            src="{% static 'img/article-icon-for-parallax.png' %}"
          />
        </div>
      </div>
    </div>
    <div class="create-page">
      <a href="{% url 'archive' %}" class="back-link">&larr; Вернуться на главную</a>
      <div class="create-card">
        <h2 class="create-title">Новая статья</h2>
        <form method="POST" class="create-form">
          {% csrf_token %}
          <div class="form-group">
            <label for="id_title">Заголовок</label>
            <input type="text" id="id_title" name="title" placeholder="Название статьи" value="{{ form.title }}">
          </div>
          <div class="form-group">
            <label for="id_text">Содержание</label>
            <textarea id="id_text" name="text" placeholder="Текст вашей статьи...">{{ form.text }}</textarea>
          </div>
          <div class="form-actions">
            <input type="submit" value="Создать статью" class="btn-submit">
          </div>
        </form>
        {% if form.errors %}
        <div class="field-errors">{{ form.errors }}</div>
        {% endif %}
      </div>
    </div>
    <script src="{% static 'js/jquery.js' %}"></script>
    <script src="{% static 'js/helloworld.js' %}"></script>
    <script src="{% static 'js/fold-post.js' %}"></script>
    <script src="{% static 'js/highlight-post.js' %}"></script>
    <script src="{% static 'js/parallax.js' %}"></script>
  </body>
</html>
